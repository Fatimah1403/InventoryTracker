version: '3.8'

services:
  mongo:
    image: mongo:6
    container_name: inventory-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - inventory-network

  redis:
    image: redis:7
    container_name: inventory-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - inventory-network

  backend:
    build: 
      context: ./server
      dockerfile: Dockerfile
    platform: linux/arm64/v8
    container_name: inventory-backend
    ports:
      - "5002:5001"
    env_file:
      - ./server/.env  
    depends_on:
      - mongo
      - redis
    networks:
      - inventory-network

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    platform: linux/arm64/v8
    container_name: inventory-frontend
    ports:
      - "3000:80"
    env_file:
      - ./client/.env  
    depends_on:
      - backend
    networks:
      - inventory-network

networks:
  inventory-network:
    driver: bridge

volumes:
  mongo_data:
