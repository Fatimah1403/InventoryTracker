# Organization and project keys from SonarCloud
sonar.organization=fatimah1403
sonar.projectKey=fatimah1403_InventoryTracker

# Project information
sonar.projectName=Inventory Tracker Secured
sonar.projectVersion=1.0

# Source code locations
# This tells SonarCloud where your code is
sonar.sources=server,client/src

# Test files location (if you have tests)
sonar.tests=server/tests,client/tests

# Files to exclude from analysis
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.test.js,**/coverage/**

# Language settings
sonar.javascript.lcov.reportPaths=server/coverage/lcov.info,client/coverage/lcov.info
sonar.typescript.lcov.reportPaths=server/coverage/lcov.info,client/coverage/lcov.info


# Encoding
sonar.sourceEncoding=UTF-8